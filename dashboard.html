<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — RentFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;650;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Inter',-apple-system,sans-serif;
      background:#07050f;color:#e4e4e7;line-height:1.5;
      -webkit-font-smoothing:antialiased;
      scrollbar-width:thin;scrollbar-color:#27272a transparent;
      min-height:100vh;display:flex;flex-direction:column;
    }
    ::-webkit-scrollbar{width:10px;height:10px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#27272a;border-radius:100px;border:2px solid #07050f}
    ::-webkit-scrollbar-thumb:hover{background:#3f3f46}

    /* === BG Layering === */
    .bg-solid {
      position: fixed; inset: 0; background-color: #05030a; z-index: 0; pointer-events: none;
    }
    .check-grid-bg{
      position:fixed;inset:0;pointer-events:none;z-index:2;
      background-image: linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .bg-glow {
      position: fixed; inset: 0; pointer-events: none; z-index: 1;
    }
    .glow-1 {
      position: absolute; top: -10%; left: -20%;
      width: 800px; height: 800px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, transparent 60%);
    }
    .glow-2 {
      position: absolute; bottom: -10%; right: -10%;
      width: 800px; height: 800px;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.08) 0%, transparent 60%);
    }
    .glow-3 {
      position: absolute; top: 35%; left: 15%;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.06) 0%, transparent 60%);
    }

    /* === Nav === */
    nav{
      display:flex;align-items:center;justify-content:space-between;
      padding:0 2rem;height:64px;
      background:rgba(7, 5, 15, 0.75);backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(255, 255, 255, 0.06);
      position:relative;z-index:3;
    }
    nav .brand{
      display:flex;align-items:center;gap:.5rem;
      font-weight:650;font-size:.95rem;color:#ffffff;
      text-decoration:none
    }
    nav .brand .m{
      width:26px;height:26px;border-radius:6px;
      background:linear-gradient(135deg,#818cf8 0%,#6366f1 100%);color:white;
      display:flex;align-items:center;justify-content:center;
      font-size:.6rem;font-weight:700;
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
    }
    nav .user-area{display:flex;align-items:center;gap:.75rem}
    nav .user-area .email{font-size:.82rem;color:#a1a1aa}
    .role-badge{
      font-size:.7rem;padding:.2rem .55rem;
      border-radius:100px;font-weight:500;
      background:rgba(255,255,255,0.05);color:#a1a1aa;border:1px solid rgba(255,255,255,0.08)
    }
    .btn-logout{
      padding:.4rem .85rem;border-radius:6px;
      background:transparent;color:#a1a1aa;
      border:1px solid rgba(255,255,255,0.08);font-size:.78rem;font-weight:500;
      cursor:pointer;transition:all .15s;font-family:inherit
    }
    .btn-logout:hover{background:rgba(255,255,255,0.05);color:#ef4444;border-color:rgba(255,255,255,0.1)}

    /* === Dashboard Container === */
    .dash{padding:2.5rem 2rem;max-width:1100px;margin:0 auto;position:relative;z-index:3;flex:1}
    .greeting{font-size:1.5rem;font-weight:650;letter-spacing:-0.025em;margin-bottom:.2rem;color:#ffffff}
    .greeting-sub{color:#a1a1aa;font-size:.85rem;margin-bottom:1.75rem}

    /* === Stats Grid === */
    .stats-grid{
      display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:.75rem;margin-bottom:2rem
    }
    .stat-card{
      background:rgba(255, 255, 255, 0.02);border:1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border-radius:10px;padding:1.25rem;transition:all .2s;
      box-shadow:0 10px 20px rgba(0,0,0,0.15)
    }
    .stat-card:hover{border-color:rgba(255,255,255,0.1);box-shadow:0 20px 40px rgba(0,0,0,0.3);transform:translateY(-2px)}
    .stat-card .stat-num{font-size:1.75rem;font-weight:700;line-height:1;letter-spacing:-0.02em;color:#ffffff}
    .stat-card .stat-lbl{font-size:.75rem;color:#a1a1aa;margin-top:.35rem;font-weight:500}
    .stat-card .stat-sub{font-size:.68rem;color:#71717a;margin-top:.15rem}
    .stat-card .stat-sub .good{color:#34d399;font-weight:550}
    .stat-card .stat-sub .warn{color:#fb923c;font-weight:550}

    /* === Section Headers === */
    .section-h{font-size:.95rem;font-weight:600;margin-bottom:.75rem;color:#ffffff;display:flex;align-items:center;gap:.5rem}
    .section-h .count{font-size:.72rem;font-weight:500;color:#a1a1aa;background:rgba(255,255,255,0.05);padding:.1rem .45rem;border-radius:100px}

    /* === Card Grids === */
    .card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:.75rem;margin-bottom:2rem}
    .card{
      background:rgba(255, 255, 255, 0.02);border:1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border-radius:10px;padding:1.25rem;transition:all .2s;
      box-shadow:0 10px 20px rgba(0,0,0,0.15)
    }
    .card:hover{border-color:rgba(255,255,255,0.1);box-shadow:0 20px 40px rgba(0,0,0,0.3);transform:translateY(-2px)}
    .card h4{font-size:.88rem;font-weight:600;margin-bottom:.35rem;color:#ffffff}
    .card p{font-size:.8rem;color:#a1a1aa;line-height:1.5}
    .card .meta{font-size:.72rem;color:#71717a;margin-top:.5rem}
    .card .tag{
      display:inline-block;font-size:.68rem;padding:.1rem .4rem;
      border-radius:100px;font-weight:500;margin-right:.3rem
    }
    .tag-green{background:rgba(52, 211, 153, 0.1);color:#34d399;box-shadow:inset 0 0 0 1px rgba(52, 211, 153, 0.2)}
    .tag-yellow{background:rgba(251, 191, 36, 0.1);color:#fbbf24;box-shadow:inset 0 0 0 1px rgba(251, 191, 36, 0.2)}
    .tag-red{background:rgba(248, 113, 113, 0.1);color:#f87171;box-shadow:inset 0 0 0 1px rgba(248, 113, 113, 0.2)}
    .tag-blue{background:rgba(99, 102, 241, 0.1);color:#818cf8;box-shadow:inset 0 0 0 1px rgba(99, 102, 241, 0.2)}
    .tag-gray{background:rgba(255, 255, 255, 0.05);color:#a1a1aa;box-shadow:inset 0 0 0 1px rgba(255, 255, 255, 0.1)}

    /* === Table === */
    .table-wrap{
      background:rgba(255, 255, 255, 0.02);border:1px solid rgba(255, 255, 255, 0.05);
      border-radius:10px;overflow-x:auto;margin-bottom:2rem;
      box-shadow:0 10px 20px rgba(0,0,0,0.15)
    }
    table{width:100%;border-collapse:collapse}
    th{
      text-align:left;padding:.6rem .85rem;
      font-size:.72rem;font-weight:600;color:#a1a1aa;
      text-transform:uppercase;letter-spacing:.04em;
      background:rgba(255, 255, 255, 0.03);border-bottom:1px solid rgba(255, 255, 255, 0.05);white-space:nowrap
    }
    td{padding:.55rem .85rem;font-size:.82rem;border-bottom:1px solid rgba(255, 255, 255, 0.03);color:#a1a1aa;white-space:nowrap}
    tr:hover td{background:rgba(255,255,255,0.02)}
    tr:last-child td{border-bottom:none}
    td .val{color:#ffffff;font-weight:500}

    /* === Buttons === */
    .btn{
      display:inline-flex;align-items:center;gap:.4rem;
      padding:.55rem 1rem;border-radius:8px;
      font-size:.82rem;font-weight:550;border:none;
      cursor:pointer;transition:all .15s;font-family:inherit;
      text-decoration:none
    }
    .btn-primary{background:#6366f1;color:white;box-shadow:0 4px 12px rgba(99, 102, 241, 0.2)}
    .btn-primary:hover{background:#4f46e5;transform:translateY(-1px);box-shadow:0 6px 16px rgba(99, 102, 241, 0.3)}
    .btn-secondary{background:rgba(255,255,255,0.03);color:#ffffff;border:1px solid rgba(255,255,255,0.08)}
    .btn-secondary:hover{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.15);transform:translateY(-1px)}
    .btn-sm{padding:.35rem .7rem;font-size:.75rem}
    .btn-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem}

    /* === Modal === */
    .modal-overlay{
      display:none;position:fixed;inset:0;
      background:rgba(0,0,0,.6);z-index:200;
      align-items:center;justify-content:center;
      padding:2rem;backdrop-filter:blur(4px);
    }
    .modal-overlay.open{display:flex}
    .modal{
      background:#0f0d19;border:1px solid rgba(255, 255, 255, 0.08);
      border-radius:16px;
      padding:1.5rem;width:100%;max-width:450px;
      box-shadow:0 30px 60px rgba(0,0,0,0.5);
    }
    .modal h2{font-size:1.1rem;font-weight:600;margin-bottom:1rem;color:#ffffff}
    .modal .field{margin-bottom:1rem}
    .modal .field label{display:block;font-size:.78rem;font-weight:500;color:#a1a1aa;margin-bottom:.25rem}
    .modal .field input,.modal .field select,.modal .field textarea{
      width:100%;padding:.55rem .7rem;border-radius:6px;
      border:1px solid rgba(255,255,255,0.08);font-size:.85rem;font-family:inherit;
      outline:none;transition:border-color .15s;background:rgba(255,255,255,0.02);color:#ffffff;
    }
    .modal .field input:focus,.modal .field select:focus,.modal .field textarea:focus{border-color:#6366f1;background:rgba(255,255,255,0.05)}
    .modal .field textarea{resize:vertical;min-height:60px}
    .modal .btn-row{margin-bottom:0}

    /* === Loading === */
    .loading{text-align:center;padding:5rem 2rem;color:#71717a}
    .loading .pulse{display:inline-block;width:36px;height:36px;border:3px solid rgba(255,255,255,0.05);border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* === Responsive === */
    @media(max-width:640px){
      .dash{padding:1.5rem 1rem}
      nav .user-area .email{display:none}
      .stats-grid{grid-template-columns:repeat(2,1fr)}
    }
  </style>
</head>
<body>
  <div class="bg-solid"></div>
  <div class="bg-glow">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
    <div class="glow-3"></div>
  </div>
  <div class="check-grid-bg"></div>
  <nav>
    <a href="/" class="brand"><span class="m">RF</span> RentFlow</a>
    <div class="user-area">
      <span class="email" id="userEmail">Loading...</span>
      
      <!-- Demo Mode Switcher -->
      <select id="demoRoleSwitcher" class="btn-sm btn-secondary" style="margin-right: 8px; border-radius: 6px; padding: 0.2rem 0.5rem; outline: none; cursor: pointer; border-color: #e4e4e7;">
        <option value="">(Real Role)</option>
        <option value="ADMIN">View as Admin</option>
        <option value="MANAGER">View as Manager</option>
        <option value="OWNER">View as Owner</option>
        <option value="TENANT">View as Tenant</option>
      </select>

      <span class="role-badge" id="roleBadge">—</span>
      <button class="btn-logout" id="logoutBtn">Sign out</button>
    </div>
  </nav>

  <div class="dash" id="dashContent">
    <div class="loading">
      <div class="pulse"></div>
      <p style="margin-top:1rem;font-size:.85rem;color:#71717a">Loading your dashboard...</p>
    </div>
  </div>

  <div class="modal-overlay" id="maintenanceModal">
    <div class="modal">
      <h2>Submit maintenance request</h2>
      <form id="maintenanceForm">
        <div class="field">
          <label for="maintTitle">Title *</label>
          <input type="text" id="maintTitle" placeholder="e.g. Leaking faucet" required>
        </div>
        <div class="field">
          <label for="maintDesc">Description</label>
          <textarea id="maintDesc" placeholder="Describe the issue..."></textarea>
        </div>
        <div class="field">
          <label for="maintPriority">Priority</label>
          <select id="maintPriority">
            <option value="LOW">Low</option>
            <option value="MEDIUM" selected>Medium</option>
            <option value="HIGH">High</option>
            <option value="URGENT">Urgent</option>
          </select>
        </div>
        <div class="btn-row">
          <button type="submit" class="btn btn-primary btn-sm">Submit request</button>
          <button type="button" class="btn btn-secondary btn-sm" onclick="document.getElementById('maintenanceModal').classList.remove('open')">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script>
  (function() {
    var token = localStorage.getItem('accessToken');
    if (!token) { window.location.href = '/login'; return; }

    function h(s) { return String(s).replace(/[&<>"']/g, function(c) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
    
    var currentUser = null; // Cache user for role switching

    // Listen to Demo Mode Switcher
    document.getElementById('demoRoleSwitcher').addEventListener('change', function(e) {
      if (!currentUser) return;
      var selectedRole = e.target.value;
      if (selectedRole) {
        // Override with demo role
        renderDashboardView(currentUser, [selectedRole], selectedRole + ' (Demo)');
      } else {
        // Fallback to real role
        var realRoles = (currentUser.roles || []).map(function(r) { return typeof r === 'string' ? r : (r.type || r.name); });
        var displayRole = realRoles.includes('ADMIN') ? 'Admin' : realRoles.includes('MANAGER') ? 'Manager' : realRoles.includes('ACCOUNTANT') ? 'Accountant' : realRoles.includes('OWNER') ? 'Owner' : realRoles.includes('TENANT') ? 'Tenant' : realRoles[0] || 'User';
        renderDashboardView(currentUser, realRoles, displayRole);
      }
    });

    function renderDashboardView(user, roleTypes, displayRole) {
      document.getElementById('roleBadge').textContent = displayRole;

      var isStaff = roleTypes.some(function(r) { return r === 'ADMIN' || r === 'MANAGER' || r === 'ACCOUNTANT'; });
      var isTenant = roleTypes.includes('TENANT');
      var isOwner = roleTypes.includes('OWNER');

      if (isStaff) { renderStaffDashboard(user); }
      else if (isTenant) { renderTenantDashboard(user); }
      else if (isOwner) { renderOwnerDashboard(user); }
      else { renderStaffDashboard(user); }
    }

    async function loadDashboard() {
      try {
        var res = await fetch('/api/v1/auth/profile', { headers: { 'Authorization': 'Bearer ' + token } });
        if (res.status === 401) { localStorage.removeItem('accessToken'); localStorage.removeItem('refreshToken'); window.location.href = '/login'; return; }
        var user = await res.json();
        currentUser = user; // Save for switcher

        document.getElementById('userEmail').textContent = user.email;
        var roleTypes = (user.roles || []).map(function(r) { return typeof r === 'string' ? r : (r.type || r.name); });
        var displayRole = roleTypes.includes('ADMIN') ? 'Admin' : roleTypes.includes('MANAGER') ? 'Manager' : roleTypes.includes('ACCOUNTANT') ? 'Accountant' : roleTypes.includes('OWNER') ? 'Owner' : roleTypes.includes('TENANT') ? 'Tenant' : roleTypes[0] || 'User';
        
        // Render initial view based on actual role
        renderDashboardView(user, roleTypes, displayRole);
      } catch(e) {
        document.getElementById('dashContent').innerHTML = '<div class="loading"><p style="font-size:.85rem;color:#71717a">Could not load dashboard. <a href="/login" style="color:#18181b;font-weight:500">Sign in again.</a></p></div>';
      }
    }

    /* ── Staff Dashboard ──────────────────────────────────────────────── */
    async function renderStaffDashboard(user) {
      var dc = document.getElementById('dashContent');
      var name = user.firstName || '';
      var cn = (user.company && user.company.name) || 'your company';

      dc.innerHTML = '' +
        '<div class="greeting">Hello, ' + h(name.split(' ')[0]) + '.</div>' +
        '<div class="greeting-sub">Portfolio overview for <strong>' + h(cn) + '</strong></div>' +
        '<div class="stats-grid" id="statsGrid">' +
          '<div class="stat-card"><div class="stat-num">—</div><div class="stat-lbl">Total Units</div></div>' +
          '<div class="stat-card"><div class="stat-num">—</div><div class="stat-lbl">Occupied</div></div>' +
          '<div class="stat-card"><div class="stat-num">—</div><div class="stat-lbl">Vacant</div></div>' +
          '<div class="stat-card"><div class="stat-num">—</div><div class="stat-lbl">Maintenance</div></div>' +
          '<div class="stat-card"><div class="stat-num">—</div><div class="stat-lbl">Collected</div></div>' +
          '<div class="stat-card"><div class="stat-num">—%</div><div class="stat-lbl">Rate</div></div>' +
        '</div>' +
        '<div class="section-h">Recent invoices</div><div class="table-wrap" id="recentInvoices"><div style="padding:1.25rem;text-align:center;color:#a1a1aa;font-size:.82rem">Loading...</div></div>' +
        '<div class="section-h">Quick actions</div>' +
        '<div class="btn-row">' +
          '<a href="/" class="btn btn-secondary btn-sm">🏠 Home</a>' +
          '<a href="/docs" class="btn btn-secondary btn-sm" target="_blank">📖 API Docs</a>' +
        '</div>';        try {
        var statsRes = await fetch('/api/v1/reports/dashboard', { headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' } }).catch(function() { return null; });
        if (statsRes && statsRes.ok) {
          var stats = await statsRes.json();
          var grid = document.getElementById('statsGrid');
          if (grid) {
            var cards = grid.querySelectorAll('.stat-card');
            if (cards.length >= 6) {
              var occ = stats.occupancy || {};
              var fin = stats.financial || {};
              cards[0].innerHTML = '<div class="stat-num">' + (occ.totalUnits || '0') + '</div><div class="stat-lbl">Total Units</div><div class="stat-sub">Across portfolio</div>';
              cards[1].innerHTML = '<div class="stat-num">' + (occ.occupiedUnits || '0') + '</div><div class="stat-lbl">Occupied</div><div class="stat-sub"><span class="good">' + (occ.occupancyRate || 0).toFixed(1) + '%</span> rate</div>';
              cards[2].innerHTML = '<div class="stat-num">' + (occ.vacantUnits || '0') + '</div><div class="stat-lbl">Vacant</div><div class="stat-sub">Available units</div>';
              cards[3].innerHTML = '<div class="stat-num">' + (occ.maintenanceUnits || '0') + '</div><div class="stat-lbl">Maintenance</div><div class="stat-sub">Under repair</div>';
              cards[4].innerHTML = '<div class="stat-num">$' + ((fin.totalCollected || 0)).toLocaleString() + '</div><div class="stat-lbl">Collected</div><div class="stat-sub">Revenue this year</div>';
              cards[5].innerHTML = '<div class="stat-num">' + (stats.occupancy.occupancyRate || 0) + '%</div><div class="stat-lbl">Occupancy Rate</div><div class="stat-sub">' + (occ.occupiedUnits || 0) + ' of ' + (occ.totalUnits || 0) + ' units rented</div>';
            }
          }
        }
      } catch(e) {}

      try {
        var invRes = await fetch('/api/v1/invoices?limit=5', { headers: { 'Authorization': 'Bearer ' + token } }).catch(function() { return null; });
        if (invRes && invRes.ok) {
          var invData = await invRes.json();
          var invs = invData.data || [];
          if (invs.length) {
            var rows = invs.map(function(i) {
              var statusTag = i.status === 'PAID' ? 'tag-green' : i.status === 'OVERDUE' ? 'tag-red' : i.status === 'PENDING' ? 'tag-yellow' : 'tag-gray';
              return '<tr><td>' + h(i.invoiceNumber) + '</td><td><span class="val">$' + (i.totalAmount || 0).toLocaleString() + '</span></td><td><span class="tag ' + statusTag + '">' + (i.status || '—') + '</span></td><td>' + h(i.unit || '—') + '</td></tr>';
            }).join('');
            document.getElementById('recentInvoices').innerHTML = '<table><thead><tr><th>Invoice</th><th>Amount</th><th>Status</th><th>Unit</th></tr></thead><tbody>' + rows + '</tbody></table>';
          } else {
            document.getElementById('recentInvoices').innerHTML = '<div style="padding:1.25rem;text-align:center;color:#a1a1aa;font-size:.82rem">No invoices yet.</div>';
          }
        } else {
          document.getElementById('recentInvoices').innerHTML = '<div style="padding:1.25rem;text-align:center;color:#a1a1aa;font-size:.82rem">Could not load invoices.</div>';
        }
      } catch(e) {
        document.getElementById('recentInvoices').innerHTML = '<div style="padding:1.25rem;text-align:center;color:#a1a1aa;font-size:.82rem">Could not load invoices.</div>';
      }
    }

    /* ── Tenant Dashboard ──────────────────────────────────────────────── */
    async function renderTenantDashboard(user) {
      var dc = document.getElementById('dashContent');
      var name = user.firstName || '';

      dc.innerHTML = '' +
        '<div class="greeting">Welcome, ' + h(name.split(' ')[0]) + '.</div>' +
        '<div class="greeting-sub">Your rental portal &mdash; view your lease, invoices, and maintenance.</div>' +
        '<div class="section-h">Your lease</div>' +
        '<div class="card-grid" id="tenantLease"><div class="card" style="text-align:center;color:#a1a1aa;font-size:.82rem">Loading...</div></div>' +
        '<div class="section-h">Invoices <span class="count" id="invCount"></span></div>' +
        '<div class="table-wrap" id="tenantInvoices"><div style="padding:1.25rem;text-align:center;color:#a1a1aa;font-size:.82rem">Loading...</div></div>' +
        '<div class="section-h">Maintenance requests</div>' +
        '<div class="table-wrap" id="tenantMaint" style="margin-bottom:1rem"><div style="padding:1.25rem;text-align:center;color:#a1a1aa;font-size:.82rem">Loading...</div></div>' +
        '<button class="btn btn-primary btn-sm" onclick="document.getElementById(\'maintenanceModal\').classList.add(\'open\')">+ Submit request</button>';

      try {
        var leaseRes = await fetch('/api/v1/tenants/me/lease', { headers: { 'Authorization': 'Bearer ' + token } }).catch(function() { return null; });
        if (leaseRes && leaseRes.ok) {
          var lease = await leaseRes.json();
          var unitName = lease.unit ? (lease.unit.name || '—') : '—';
          var bldgName = lease.unit && lease.unit.building ? lease.unit.building.name : '';
          var propName = lease.unit && lease.unit.building && lease.unit.building.property ? lease.unit.building.property.name : '';
          var rent = '$' + (lease.rentAmount || 0).toLocaleString();
          var startD = new Date(lease.startDate).toLocaleDateString();
          var endD = lease.endDate ? new Date(lease.endDate).toLocaleDateString() : 'Open';
          document.getElementById('tenantLease').innerHTML = '' +
            '<div class="card"><h4>Unit ' + h(unitName) + '</h4><p>' + h(bldgName) + (bldgName && propName ? ' &middot; ' : '') + h(propName) + '</p><div class="meta">Rent: <strong>' + rent + '</strong> &middot; ' + startD + ' &mdash; ' + endD + '</div></div>';
        } else {
          document.getElementById('tenantLease').innerHTML = '<div class="card" style="text-align:center;color:#a1a1aa;font-size:.82rem">No active lease found.</div>';
        }
      } catch(e) { document.getElementById('tenantLease').innerHTML = '<div class="card" style="text-align:center;color:#a1a1aa;font-size:.82rem">Could not load lease.</div>'; }

      try {
        var invRes = await fetch('/api/v1/tenants/me/invoices', { headers: { 'Authorization': 'Bearer ' + token } }).catch(function() { return null; });
        if (invRes && invRes.ok) {
          var invs = await invRes.json();
          if (invs && invs.length) {
            document.getElementById('invCount').textContent = invs.length;
            var rows = invs.map(function(i) {
              var statusTag = i.status === 'PAID' ? 'tag-green' : i.status === 'OVERDUE' ? 'tag-red' : i.status === 'PENDING' ? 'tag-yellow' : 'tag-gray';
              return '<tr><td>' + h(i.invoiceNumber) + '</td><td><span class="val">$' + (i.totalAmount || 0).toLocaleString() + '</span></td><td><span class="val">$' + (i.paidAmount || 0).toLocaleString() + '</span></td><td><span class="tag ' + statusTag + '">' + (i.status || '—') + '</span></td><td>' + new Date(i.dueDate).toLocaleDateString() + '</td></tr>';
            }).join('');
            document.getElementById('tenantInvoices').innerHTML = '<table><thead><tr><th>Invoice</th><th>Total</th><th>Paid</th><th>Status</th><th>Due</th></tr></thead><tbody>' + rows + '</tbody></table>';
          } else {
            document.getElementById('tenantInvoices').innerHTML = '<div style="padding:1.25rem;text-align:center;color:#a1a1aa;font-size:.82rem">No invoices yet.</div>';
          }
        } else {
          document.getElementById('tenantInvoices').innerHTML = '<div style="padding:1.25rem;text-align:center;color:#a1a1aa;font-size:.82rem">Could not load invoices.</div>';
        }
      } catch(e) { document.getElementById('tenantInvoices').innerHTML = '<div style="padding:1.25rem;text-align:center;color:#a1a1aa;font-size:.82rem">Could not load invoices.</div>'; }

      try {
        var maintRes = await fetch('/api/v1/tenants/me/maintenance', { headers: { 'Authorization': 'Bearer ' + token } }).catch(function() { return null; });
        if (maintRes && maintRes.ok) {
          var reqs = await maintRes.json();
          if (reqs && reqs.length) {
            var rows = reqs.map(function(r) {
              var pTag = r.priority === 'URGENT' || r.priority === 'HIGH' ? 'tag-red' : r.priority === 'MEDIUM' ? 'tag-yellow' : 'tag-gray';
              var sTag = r.status === 'COMPLETED' ? 'tag-green' : r.status === 'IN_PROGRESS' || r.status === 'ACKNOWLEDGED' ? 'tag-blue' : r.status === 'SUBMITTED' ? 'tag-yellow' : 'tag-gray';
              return '<tr><td>' + h(r.title) + '</td><td><span class="tag ' + pTag + '">' + (r.priority || '—') + '</span></td><td><span class="tag ' + sTag + '">' + (r.status || '—') + '</span></td><td>' + (r.createdAt ? new Date(r.createdAt).toLocaleDateString() : '—') + '</td></tr>';
            }).join('');
            document.getElementById('tenantMaint').innerHTML = '<table><thead><tr><th>Title</th><th>Priority</th><th>Status</th><th>Date</th></tr></thead><tbody>' + rows + '</tbody></table>';
          } else {
            document.getElementById('tenantMaint').innerHTML = '<div style="padding:1.25rem;text-align:center;color:#a1a1aa;font-size:.82rem">No maintenance requests. All clear!</div>';
          }
        } else {
          document.getElementById('tenantMaint').innerHTML = '<div style="padding:1.25rem;text-align:center;color:#a1a1aa;font-size:.82rem">Could not load maintenance requests.</div>';
        }
      } catch(e) { document.getElementById('tenantMaint').innerHTML = '<div style="padding:1.25rem;text-align:center;color:#a1a1aa;font-size:.82rem">Could not load maintenance requests.</div>'; }

      // Maintenance form submit
      document.getElementById('maintenanceForm').addEventListener('submit', async function(ev) {
        ev.preventDefault();
        var title = document.getElementById('maintTitle').value.trim();
        var desc = document.getElementById('maintDesc').value.trim();
        var priority = document.getElementById('maintPriority').value;
        if (!title) return;
        try {
          var res = await fetch('/api/v1/tenants/me/maintenance', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: title, description: desc, priority: priority })
          });
          if (res.ok) {
            document.getElementById('maintenanceModal').classList.remove('open');
            renderTenantDashboard(user); // reload
          } else {
            var d = await res.json();
            alert(d.message || 'Failed to submit request');
          }
        } catch(e) { alert('Failed to submit request'); }
      });
    }

    /* ── Owner Dashboard ───────────────────────────────────────────────── */
    async function renderOwnerDashboard(user) {
      var dc = document.getElementById('dashContent');
      var name = user.firstName || '';

      dc.innerHTML = '' +
        '<div class="greeting">Welcome, ' + h(name.split(' ')[0]) + '.</div>' +
        '<div class="greeting-sub">Your properties &mdash; portfolio overview and financial summary.</div>' +
        '<div class="section-h">Financial summary</div>' +
        '<div class="stats-grid" id="ownerFinancials"><div class="stat-card" style="text-align:center;color:#a1a1aa;font-size:.82rem">Loading...</div></div>' +
        '<div class="section-h">Your properties</div>' +
        '<div class="card-grid" id="ownerProperties"><div class="card" style="text-align:center;color:#a1a1aa;font-size:.82rem">Loading...</div></div>';

      try {
        var finRes = await fetch('/api/v1/owners/me/financials', { headers: { 'Authorization': 'Bearer ' + token } }).catch(function() { return null; });
        if (finRes && finRes.ok) {
          var fin = await finRes.json();
          document.getElementById('ownerFinancials').innerHTML = '' +
            '<div class="stat-card"><div class="stat-num">' + (fin.units ? fin.units.total : '0') + '</div><div class="stat-lbl">Total Units</div><div class="stat-sub"><span class="good">' + (fin.units ? fin.units.occupied : '0') + ' occupied</span> &middot; <span class="warn">' + (fin.units ? fin.units.vacant : '0') + ' vacant</span></div></div>' +
            '<div class="stat-card"><div class="stat-num">$' + ((fin.finances ? fin.finances.totalRent : 0) || 0).toLocaleString() + '</div><div class="stat-lbl">Total Rent</div></div>' +
            '<div class="stat-card"><div class="stat-num">$' + ((fin.finances ? fin.finances.totalCollected : 0) || 0).toLocaleString() + '</div><div class="stat-lbl">Collected</div><div class="stat-sub">Net: <strong>$' + ((fin.finances ? fin.finances.netIncome : 0) || 0).toLocaleString() + '</strong></div></div>' +
            '<div class="stat-card"><div class="stat-num">$' + ((fin.finances ? fin.finances.totalExpenses : 0) || 0).toLocaleString() + '</div><div class="stat-lbl">Expenses</div></div>';
        } else {
          document.getElementById('ownerFinancials').innerHTML = '<div class="stat-card" style="text-align:center;color:#a1a1aa;font-size:.82rem">Could not load financials.</div>';
        }
      } catch(e) { document.getElementById('ownerFinancials').innerHTML = '<div class="stat-card" style="text-align:center;color:#a1a1aa;font-size:.82rem">Could not load financials.</div>'; }

      try {
        var propRes = await fetch('/api/v1/owners/me/properties', { headers: { 'Authorization': 'Bearer ' + token } }).catch(function() { return null; });
        if (propRes && propRes.ok) {
          var props = await propRes.json();
          if (props && props.length) {
            var cards = props.map(function(p) {
              var units = p.buildings ? p.buildings.reduce(function(acc, b) { return acc + (b.units ? b.units.length : 0); }, 0) : 0;
              var occupied = 0;
              if (p.buildings) { p.buildings.forEach(function(b) { if (b.units) { b.units.forEach(function(u) { if (u.status === 'OCCUPIED') occupied++; }); } }); }
              return '<div class="card"><h4>' + h(p.name) + '</h4><p>' + h(p.address || '') + '</p><div class="meta">' + units + ' units &middot; <span class="tag tag-green">' + occupied + ' occupied</span> <span class="tag tag-yellow">' + (units - occupied) + ' vacant</span></div></div>';
            }).join('');
            document.getElementById('ownerProperties').innerHTML = cards;
          } else {
            document.getElementById('ownerProperties').innerHTML = '<div class="card" style="text-align:center;color:#a1a1aa;font-size:.82rem">No properties found.</div>';
          }
        } else {
          document.getElementById('ownerProperties').innerHTML = '<div class="card" style="text-align:center;color:#a1a1aa;font-size:.82rem">Could not load properties.</div>';
        }
      } catch(e) { document.getElementById('ownerProperties').innerHTML = '<div class="card" style="text-align:center;color:#a1a1aa;font-size:.82rem">Could not load properties.</div>'; }
    }

    /* ── Logout ────────────────────────────────────────────────────────── */
    document.getElementById('logoutBtn').addEventListener('click', function() {
      var t = localStorage.getItem('accessToken');
      if (t) { fetch('/api/v1/auth/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + t } }).catch(function() {}); }
      localStorage.removeItem('accessToken');
      localStorage.removeItem('refreshToken');
      window.location.href = '/login';
    });

    loadDashboard();
  })();
  </script>
</body>
</html>
